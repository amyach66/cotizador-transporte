<!DOCTYPE html>
<html>
<head>
    <title>Cotizador</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h2>🚐 Cotizador de Transporte</h2>

<form method="POST">
    <input type="text" name="origen" placeholder="Pickup" required><br><br>
    <input type="text" name="destino" placeholder="Dropoff" required><br><br>

    <select name="tipo">
        <option value="Business">Business</option>
        <option value="Van">Van</option>
    </select><br><br>

    <button type="submit">Calcular</button>
</form>

{% if precio %}
    <h3>Distancia: {{ distancia }} millas</h3>
    <h3>Precio: ${{ precio }}</h3>
{% endif %}

</body>
</html>
