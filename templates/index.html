<!DOCTYPE html>
<html>
<head>
    <title>Amyach Logistics</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

  

    <!-- ✅ SOLO UN SCRIPT (EL BUENO) -->
    <script async defer
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyASKSqaSVc6WiZdhkN9mnTDEx5_AwDo2y8&libraries=places&callback=initMap">
    </script>

</head>

<body>

<div class="container">

    <H1>AMYACH LOGISTICS LLC</H1>
    <P>Luxury Ride Quote</P>
    

    <div class="card">

        <form method="POST">

            <button type="button" class="location-btn" onclick="usarUbicacion()">
                📍 Use my location
            </button>

            <input id="origen" name="origen" placeholder="Pickup location"
            value="{{ request.form.origen }}" required>

            <input id="destino" name="destino" placeholder="Dropoff location"
            value="{{ request.form.destino }}" required>

            <select name="tipo">
                <option value="Business" {% if request.form.tipo == "Business" %}selected{% endif %}>
                Business
                </option>
                <option value="Van" {% if request.form.tipo == "Van" %}selected{% endif %}>
                Van
                </option>
            </select>

            <button type="submit">Calculate Price</button>

        </form>

        <div id="map" style="height:400px; margin-top:15px;"></div>

        {% if precio %}
        <div class="resultado">
            <div>Distance: {{ "%.1f"|format(distancia) }} mi</div>
            <div>Estimated time: {{ duracion }}</div>
            <div><b>${{ precio }}</b></div>
        </div>
        {% endif %}

    </div>

</div>

<script>
let map, directionsService, directionsRenderer;
let origenListo = false;
let destinoListo = false;

function initMap() {

    const origenInput = document.getElementById("origen");
    const destinoInput = document.getElementById("destino");
    const tipoSelect = document.querySelector("select[name='tipo']");

    map = new google.maps.Map(document.getElementById("map"), {
        center: { lat: 26.1224, lng: -80.1373 },
        zoom: 10,
    });

    directionsService = new google.maps.DirectionsService();
    directionsRenderer = new google.maps.DirectionsRenderer();
    directionsRenderer.setMap(map);

    const origenAutocomplete = new google.maps.places.Autocomplete(origenInput);
    const destinoAutocomplete = new google.maps.places.Autocomplete(destinoInput);

    // 👉 marcar cuando seleccionan direcciones
    origenAutocomplete.addListener("place_changed", () => {
        origenListo = true;
        intentarCalculo();
    });

    destinoAutocomplete.addListener("place_changed", () => {
        destinoListo = true;
        intentarCalculo();
    });

    // 👉 cuando eligen tipo
    tipoSelect.addEventListener("change", intentarCalculo);
}

// 🎯 CONTROLADOR INTELIGENTE
function intentarCalculo() {
    const tipo = document.querySelector("select[name='tipo']").value;

    if (origenListo && destinoListo && tipo) {
        calcularRuta();

        setTimeout(() => {
            document.querySelector("form").submit();
        }, 500);
    }
}

// 🚗 RUTA
function calcularRuta() {
    const origen = document.getElementById("origen").value;
    const destino = document.getElementById("destino").value;

    if (!origen || !destino) return;

    directionsService.route({
        origin: origen,
        destination: destino,
        travelMode: google.maps.TravelMode.DRIVING
    }, function(result, status) {
        if (status === "OK") {
            directionsRenderer.setDirections(result);
        }
    });
}

// 📍 GEOLOCATION
function usarUbicacion() {
    navigator.geolocation.getCurrentPosition(function(position) {
        document.getElementById("origen").value =
            position.coords.latitude + "," + position.coords.longitude;

        origenListo = true;
    });
}
    window.addEventListener("load", function() {
    const origen = document.getElementById("origen").value;
    const destino = document.getElementById("destino").value;

    if (origen && destino) {
        setTimeout(() => {
            calcularRuta();
        }, 500);
    }
});
</script>

</body>
</html>
