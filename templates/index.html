<script>
let map, directionsService, directionsRenderer;

function initMap() {

    const origenInput = document.getElementById("origen");
    const destinoInput = document.getElementById("destino");

    if (!google || !google.maps) return;

    // 🗺️ MAPA
    map = new google.maps.Map(document.getElementById("map"), {
        center: { lat: 26.1224, lng: -80.1373 },
        zoom: 10,
    });

    directionsService = new google.maps.DirectionsService();
    directionsRenderer = new google.maps.DirectionsRenderer();
    directionsRenderer.setMap(map);

    // 💎 AUTOCOMPLETE PRO (solo direcciones válidas)
    const options = {
        fields: ["formatted_address", "geometry"]
    };

    const origenAutocomplete = new google.maps.places.Autocomplete(origenInput, options);
    const destinoAutocomplete = new google.maps.places.Autocomplete(destinoInput, options);

    // 🚀 AUTOMÁTICO TIPO UBER
    origenAutocomplete.addListener("place_changed", calcularTodo);
    destinoAutocomplete.addListener("place_changed", calcularTodo);
}

// 🚗 DIBUJAR RUTA
function calcularRuta() {
    if (!directionsService || !directionsRenderer) return;

    const origen = document.getElementById("origen").value;
    const destino = document.getElementById("destino").value;

    if (!origen || !destino) return;

    directionsService.route({
        origin: origen,
        destination: destino,
        travelMode: google.maps.TravelMode.DRIVING
    }, function(result, status) {
        if (status === "OK") {
            directionsRenderer.setDirections(result);
        } else {
            console.error("Error ruta:", status);
        }
    });
}

// 💥 TODO AUTOMÁTICO (RUTA + PRECIO)
function calcularTodo() {
    calcularRuta();

    // enviar formulario automáticamente (calcula precio backend)
    setTimeout(() => {
        document.querySelector("form").submit();
    }, 500);
}

// 📍 GEOLOCATION
function usarUbicacion() {
    navigator.geolocation.getCurrentPosition(function(position) {
        document.getElementById("origen").value =
            position.coords.latitude + "," + position.coords.longitude;

        // recalcular automáticamente
        calcularTodo();
    });
}
</script>
