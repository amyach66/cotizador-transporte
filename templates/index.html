<!DOCTYPE html>
<html>
<head>
    <title>Amyach Logistics</title>

    <style>
        body {
            background: linear-gradient(135deg, #0b1a2f, #111827);
            font-family: 'Segoe UI', sans-serif;
            color: white;
            text-align: center;
        }

        .container {
            margin-top: 80px;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }

        p {
            color: #9ca3af;
            margin-bottom: 30px;
        }

        .card {
            background: #1f2937;
            padding: 30px;
            border-radius: 15px;
            width: 320px;
            margin: auto;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.4);
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 8px;
            border: none;
            background: #374151;
            color: white;
        }

        input::placeholder {
            color: #9ca3af;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #22c55e;
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .location-btn {
            background: #2563eb;
            margin-bottom: 10px;
        }

        .resultado {
            margin-top: 25px;
            padding: 20px;
            background: #111827;
            border-radius: 12px;
        }

        .precio {
            font-size: 26px;
            color: #22c55e;
            font-weight: bold;
        }

        .detalle {
            font-size: 14px;
            color: #9ca3af;
        }
    </style>

    <!-- Google Places -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyASKSqaSVc6WiZdhkN9mnTDEx5_AwDo2y8&libraries=places"></script>
</head>

<body>

<div class="container">

    <h1>Luxury Ride Quote</h1>
    <p>Amyach Logistics</p>

    <div class="card">

        <form method="POST">

            <button type="button" class="location-btn" onclick="usarUbicacion()">
                📍 Use my location
            </button>

            <input id="origen" type="text" name="origen" placeholder="Pickup location"
            value="{{ request.form.origen }}" required>

            <input id="destino" type="text" name="destino" placeholder="Dropoff location"
            value="{{ request.form.destino }}" required>

            <select name="tipo">
                <option value="Business" {% if request.form.tipo == "Business" %}selected{% endif %}>Business</option>
                <option value="Van" {% if request.form.tipo == "Van" %}selected{% endif %}>Van</option>
            </select>

            <button type="submit">Calculate Price</button>

        </form>

        <div id="map" style="height: 400px; margin-top:20px; border-radius:12px;"></div>

        {% if precio %}
        <div class="resultado">
            <div class="detalle">Distance: {{ "%.1f"|format(distancia) }} mi</div>
            <div class="detalle">Estimated time: {{ duracion }}</div>
            <div class="precio">${{ precio }}</div>
        </div>
        {% endif %}

    </div>

</div>

<!-- AUTOCOMPLETE -->
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyASKSqaSVc6WiZdhkN9mnTDEx5_AwDo2y8&libraries=places"></script>

<script>
let map;
let directionsService;
let directionsRenderer;

function initMap() {
    map = new google.maps.Map(document.getElementById("map"), {
        center: { lat: 26.1224, lng: -80.1373 }, // Fort Lauderdale default
        zoom: 10,
    });

    directionsService = new google.maps.DirectionsService();
    directionsRenderer = new google.maps.DirectionsRenderer();
    directionsRenderer.setMap(map);

    initAutocomplete();
}

function initAutocomplete() {
    const origen = document.getElementById("origen");
    const destino = document.getElementById("destino");

    new google.maps.places.Autocomplete(origen);
    new google.maps.places.Autocomplete(destino);
}

// 🚗 DIBUJAR RUTA
function calcularRuta() {
    const origen = document.getElementById("origen").value;
    const destino = document.getElementById("destino").value;

    if (!origen || !destino) return;

    directionsService.route({
        origin: origen,
        destination: destino,
        travelMode: 'DRIVING'
    }, function(result, status) {
        if (status === 'OK') {
            directionsRenderer.setDirections(result);
        }
    });
}

// 📍 GEOLOCATION
function usarUbicacion() {
    navigator.geolocation.getCurrentPosition(function(position) {
        const lat = position.coords.latitude;
        const lng = position.coords.longitude;

        document.getElementById("origen").value = lat + "," + lng;
    });
}

// 🔥 EJECUTAR AL CARGAR
window.onload = initMap;

// 🔁 EJECUTAR AL ENVIAR FORM
document.querySelector("form").addEventListener("submit", function() {
    setTimeout(calcularRuta, 500);
});
</script>

</body>
</html>
