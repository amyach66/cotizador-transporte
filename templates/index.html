<!DOCTYPE html>
<html>
<head>
    <title>Amyach Logistics</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container horizontal">
    <div class="card horizontal-card">

        <div class="form-section">

            <div class="branding">
                <h1>Amyach Logistics</h1>
                <p>Luxury Ride Quote</p>
            </div>

            <form method="POST">

                <button type="button" class="location-btn" onclick="usarUbicacion()">
                    📍 Use my location
                </button>

                <input id="origen" name="origen" placeholder="Pickup location"
                value="{{ request.form.origen }}" required>

                <!-- 🔥 NUEVO: coordenadas reales -->
                <input type="hidden" id="origen_coords">

                <input id="destino" name="destino" placeholder="Dropoff location"
                value="{{ request.form.destino }}" required>

                <div class="vehicle-selector">

                    <div class="vehicle-option" onclick="selectVehicle('Business', this)">
                        🚗 Business
                    </div>

                    <div class="vehicle-option" onclick="selectVehicle('Van', this)">
                        🚐 Van
                    </div>

                </div>

                <input type="hidden" name="tipo" id="tipo"
                value="{{ request.form.tipo or 'Business' }}">

                <button type="submit">Calculate Price</button>

            </form>

            {% if precio %}
            <div class="resultado">
                <div>Distance: {{ "%.1f"|format(distancia) }} mi</div>
                <div>Estimated time: {{ duracion }}</div>
                <div><b>${{ precio }}</b></div>
            </div>
            {% endif %}

        </div>

        <div class="map-section">
            <div id="map"></div>
        </div>

    </div>
</div>

<script>
let map, directionsService, directionsRenderer;

window.initMap = function () {

    const origenInput = document.getElementById("origen");
    const destinoInput = document.getElementById("destino");

    map = new google.maps.Map(document.getElementById("map"), {
        center: { lat: 26.1224, lng: -80.1373 },
        zoom: 10,
    });

    directionsService = new google.maps.DirectionsService();
    directionsRenderer = new google.maps.DirectionsRenderer();
    directionsRenderer.setMap(map);

    new google.maps.places.Autocomplete(origenInput);
    new google.maps.places.Autocomplete(destinoInput);

    // 🔥 FIX: limpiar coordenadas si el usuario escribe
    origenInput.addEventListener("input", function() {
        document.getElementById("origen_coords").value = "";
        calcularRuta();
    });

    destinoInput.addEventListener("input", calcularRuta);

    setTimeout(() => {
        if (origenInput.value && destinoInput.value) {
            calcularRuta();
        }
    }, 700);

    activarVehiculoInicial();
};


// =========================
// 🗺️ CALCULAR RUTA (FIXED)
// =========================
function calcularRuta() {

    if (!directionsService) return;

    const origenTexto = document.getElementById("origen").value;
    const destino = document.getElementById("destino").value;
    const origenCoords = document.getElementById("origen_coords").value;

    if (!origenTexto || !destino) return;

    let origenFinal;

    // 🔥 usar coordenadas si existen
    if (origenCoords) {
        const parts = origenCoords.split(",");
        origenFinal = {
            lat: parseFloat(parts[0]),
            lng: parseFloat(parts[1])
        };
    } else {
        origenFinal = origenTexto;
    }

    directionsService.route({
        origin: origenFinal,
        destination: destino,
        travelMode: 'DRIVING'
    }, function(result, status) {

        if (status === 'OK') {

            directionsRenderer.setDirections(result);

            const bounds = new google.maps.LatLngBounds();
            result.routes[0].overview_path.forEach(p => bounds.extend(p));
            map.fitBounds(bounds);

        } else {
            console.log("Route error:", status);
        }
    });
}


// =========================
// 📍 GEOLOCATION (FIXED)
// =========================
function usarUbicacion() {

    const btn = document.querySelector(".location-btn");
    btn.innerText = "Locating...";

    navigator.geolocation.getCurrentPosition(

        function(position) {

            const lat = position.coords.latitude;
            const lng = position.coords.longitude;

            // 🔥 guardar coordenadas reales
            document.getElementById("origen_coords").value = lat + "," + lng;

            const geocoder = new google.maps.Geocoder();

            geocoder.geocode({ location: { lat, lng } }, function(results, status) {

                if (status === "OK" && results[0]) {
                    document.getElementById("origen").value = results[0].formatted_address;
                }

                calcularRuta();
                btn.innerText = "📍 Use my location";
            });

        },

        function(error) {
            btn.innerText = "📍 Use my location";
            alert("Location error: " + error.message);
        },

        {
            enableHighAccuracy: true,
            timeout: 10000,
            maximumAge: 0
        }
    );
}


// =========================
// 🚗 VEHICLE SELECTOR
// =========================
function selectVehicle(tipo, element) {

    document.getElementById("tipo").value = tipo;

    document.querySelectorAll(".vehicle-option").forEach(el => {
        el.classList.remove("active");
    });

    element.classList.add("active");

    calcularRuta();
}


// =========================
// 🔄 INICIAL
// =========================
function activarVehiculoInicial() {
    const tipo = document.getElementById("tipo").value;

    document.querySelectorAll(".vehicle-option").forEach(el => {
        if (el.textContent.includes(tipo)) {
            el.classList.add("active");
        }
    });
}
</script>

<script async defer
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyASKSqaSVc6WiZdhkN9mnTDEx5_AwDo2y8&libraries=places&callback=initMap">
</script>

</body>
</html>
