<!DOCTYPE html>
<html>
<head>
    <title>Amyach Logistics</title>

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container horizontal">

    <div class="card horizontal-card">

        <!-- ===================== -->
        <!-- FORMULARIO -->
        <!-- ===================== -->
        <div class="form-section">

            <h2>Luxury Ride Quote</h2>

            <form method="POST">

                <button type="button" class="location-btn" onclick="usarUbicacion()">
                    📍 Use my location
                </button>

                <input id="origen" name="origen"
                placeholder="Pickup location"
                value="{{ request.form.origen }}" required>

                <input id="destino" name="destino"
                placeholder="Dropoff location"
                value="{{ request.form.destino }}" required>

                <!-- 🚗 SELECTOR VISUAL -->
                <div class="vehicle-selector">

                    <div class="vehicle-option {% if request.form.tipo == 'Business' %}active{% endif %}"
                        onclick="selectVehicle('Business', this)">
                        <div class="icon">🚗</div>
                        <div class="label">Business</div>
                    </div>

                    <div class="vehicle-option {% if request.form.tipo == 'Van' %}active{% endif %}"
                        onclick="selectVehicle('Van', this)">
                        <div class="icon">🚐</div>
                        <div class="label">Van</div>
                    </div>

                </div>

                <!-- valor oculto -->
                <input type="hidden" name="tipo" id="tipo"
                value="{{ request.form.tipo or 'Business' }}">

                <button type="submit">Calculate Price</button>

            </form>

            {% if precio %}
            <div class="resultado">
                <div>Distance: {{ "%.1f"|format(distancia) }} mi</div>
                <div>Estimated time: {{ duracion }}</div>
                <div><b>${{ precio }}</b></div>
            </div>
            {% endif %}

        </div>

        <!-- ===================== -->
        <!-- MAPA -->
        <!-- ===================== -->
        <div class="map-section">
            <div id="map"></div>
        </div>

    </div>

</div>

<!-- ===================== -->
<!-- JS -->
<!-- ===================== -->
<script>

let map, directionsService, directionsRenderer;
let origenListo = false;
let destinoListo = false;

// 🚀 MAPA GLOBAL (FIX IMPORTANTE)
window.initMap = function () {

    console.log("Mapa cargado ✅");

    const origenInput = document.getElementById("origen");
    const destinoInput = document.getElementById("destino");

    if (!origenInput || !destinoInput) {
        console.error("Inputs no encontrados");
        return;
    }

    // MAPA
    map = new google.maps.Map(document.getElementById("map"), {
        center: { lat: 26.1224, lng: -80.1373 },
        zoom: 10,
    });

    directionsService = new google.maps.DirectionsService();
    directionsRenderer = new google.maps.DirectionsRenderer();
    directionsRenderer.setMap(map);

    // AUTOCOMPLETE
    const origenAutocomplete = new google.maps.places.Autocomplete(origenInput);
    const destinoAutocomplete = new google.maps.places.Autocomplete(destinoInput);

    origenAutocomplete.addListener("place_changed", () => {
        origenListo = true;
        intentarCalculo();
    });

    destinoAutocomplete.addListener("place_changed", () => {
        destinoListo = true;
        intentarCalculo();
    });
};

// 🚗 RUTA
function calcularRuta() {

    if (!directionsService || !directionsRenderer) {
        console.error("Mapa no inicializado");
        return;
    }

    const origen = document.getElementById("origen").value;
    const destino = document.getElementById("destino").value;

    if (!origen || !destino) return;

    directionsService.route({
        origin: origen,
        destination: destino,
        travelMode: 'DRIVING'
    }, function(result, status) {
        if (status === 'OK') {
            directionsRenderer.setDirections(result);
        } else {
            console.error("Error ruta:", status);
        }
    });
}

// 🔄 CONTROL FLUJO
function intentarCalculo() {
    const tipo = document.getElementById("tipo").value;

    if (origenListo && destinoListo && tipo) {
        calcularRuta();
    }
}

// 📍 GEOLOCATION
function usarUbicacion() {
    navigator.geolocation.getCurrentPosition(function(position) {
        document.getElementById("origen").value =
            position.coords.latitude + "," + position.coords.longitude;
    });
}

// 🚗 SELECTOR VISUAL
function selectVehicle(tipo, element) {

    document.getElementById("tipo").value = tipo;

    document.querySelectorAll(".vehicle-option").forEach(el => {
        el.classList.remove("active");
    });

    element.classList.add("active");

    intentarCalculo();
}

</script>

<!-- GOOGLE MAPS -->
<script async defer
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyASKSqaSVc6WiZdhkN9mnTDEx5_AwDo2y8&libraries=places&callback=initMap">
</script>

</body>
</html>
