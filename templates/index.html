<!DOCTYPE html>
<html>
<head>
    <title>Amyach Logistics</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container horizontal">
    <div class="card horizontal-card">

        <div class="form-section">

            <div class="branding">
                <h1>Amyach Logistics</h1>
                <p>Luxury Ride Quote</p>
            </div>

            <form method="POST">

                <button type="button" class="location-btn" onclick="usarUbicacion()">
                    📍 Use my location
                </button>

                <input id="origen" name="origen"
                value="{{ origen }}"
                placeholder="Pickup location" required>

                <input id="destino" name="destino"
                value="{{ destino }}"
                placeholder="Dropoff location" required>

                <!-- 🔥 DATOS DEL MAPA -->
                <input type="hidden" name="km_real" id="km_real">
                <input type="hidden" name="duracion_real" id="duracion_real">

                <div class="vehicle-selector">

                    <div class="vehicle-option {% if tipo == 'Business' %}active{% endif %}"
                        onclick="selectVehicle('Business', this)">
                        🚗 Business
                    </div>

                    <div class="vehicle-option {% if tipo == 'Van' %}active{% endif %}"
                        onclick="selectVehicle('Van', this)">
                        🚐 Van
                    </div>

                </div>

                <input type="hidden" name="tipo" id="tipo" value="{{ tipo }}">

                <button type="submit">Calculate Price</button>

            </form>

            {% if precio %}
            <div class="resultado">
                <div>Distance: {{ distancia }} mi</div>
                <div>Estimated time: {{ duracion }}</div>
                <div><b>${{ precio }}</b></div>
            </div>
            {% endif %}

        </div>

        <div class="map-section">
            <div id="map"></div>
        </div>

    </div>
</div>

<script>
let map, directionsService, directionsRenderer;

window.initMap = function () {

    const origenInput = document.getElementById("origen");
    const destinoInput = document.getElementById("destino");

    map = new google.maps.Map(document.getElementById("map"), {
        center: { lat: 26.1224, lng: -80.1373 },
        zoom: 10,
    });

    directionsService = new google.maps.DirectionsService();
    directionsRenderer = new google.maps.DirectionsRenderer();
    directionsRenderer.setMap(map);

    new google.maps.places.Autocomplete(origenInput);
    new google.maps.places.Autocomplete(destinoInput);

    origenInput.addEventListener("input", calcularRuta);
    destinoInput.addEventListener("input", calcularRuta);

    // 🔥 REDIBUJAR RUTA DESPUÉS DE POST
    setTimeout(() => {
        if (origenInput.value && destinoInput.value) {
            calcularRuta();
        }
    }, 500);
};


function calcularRuta() {

    const origen = document.getElementById("origen").value;
    const destino = document.getElementById("destino").value;

    if (!origen || !destino) return;

    directionsService.route({
        origin: origen,
        destination: destino,
        travelMode: 'DRIVING'
    }, function(result, status) {

        if (status === 'OK') {

            directionsRenderer.setDirections(result);

            const route = result.routes[0].legs[0];

            const km = route.distance.value / 1000;
            const duracion = route.duration.text;

            document.getElementById("km_real").value = km;
            document.getElementById("duracion_real").value = duracion;

            const bounds = new google.maps.LatLngBounds();
            result.routes[0].overview_path.forEach(p => bounds.extend(p));
            map.fitBounds(bounds);
        }
    });
}


function usarUbicacion() {

    navigator.geolocation.getCurrentPosition(function(position) {

        const lat = position.coords.latitude;
        const lng = position.coords.longitude;

        document.getElementById("origen").value = lat + "," + lng;

        calcularRuta();
    });
}


function selectVehicle(tipo, el) {

    document.getElementById("tipo").value = tipo;

    document.querySelectorAll(".vehicle-option").forEach(e => e.classList.remove("active"));
    el.classList.add("active");
}
</script>

<script async defer
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyASKSqaSVc6WiZdhkN9mnTDEx5_AwDo2y8&libraries=places&callback=initMap">
</script>

</body>
</html>
