<!DOCTYPE html>
<html>
<head>
    <title>Amyach Logistics</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container horizontal">
    <div class="card horizontal-card">

        <div class="form-section">

            <div class="branding">
                <h1>Amyach Logistics</h1>
                <p>Luxury Ride Quote</p>
            </div>

            <form method="POST" id="quoteForm">

                <button type="button" class="location-btn" onclick="usarUbicacion()">
                    📍 Use my location
                </button>

                <!-- ORIGEN -->
                <div class="input-group">
                    <span class="label">A</span>
                    <input id="origen" name="origen" value="{{ origen }}" placeholder="Pickup location" required>
                </div>

                <!-- STOPS -->
                <div id="stops-container"></div>

                <!-- DESTINO -->
                <div class="input-group">
                    <span class="label" id="destino-label">B</span>
                    <input id="destino" name="destino" value="{{ destino }}" placeholder="Dropoff location" required>
                </div>

                <button type="button" onclick="agregarParada()">➕ Add Stop</button>

                <input type="hidden" name="km_real" id="km_real">
                <input type="hidden" name="duracion_real" id="duracion_real">
                <input type="hidden" name="eta_real" id="eta_real">

                <div class="vehicle-selector">
                    <div class="vehicle-option {% if tipo == 'Business' %}active{% endif %}" onclick="selectVehicle('Business', this)">🚗 Business</div>
                    <div class="vehicle-option {% if tipo == 'Van' %}active{% endif %}" onclick="selectVehicle('Van', this)">🚐 Van</div>
                </div>

                <input type="hidden" name="tipo" id="tipo" value="{{ tipo }}">

                <button type="button" onclick="handleSubmit()">Calculate Price</button>

            </form>

            {% if precio %}
            <div class="resultado">
                <div>Distance: {{ distancia }} mi</div>
                <div>Duration: {{ duracion }}</div>
                <div>Arrival: {{ eta }}</div>   
                <div><b>${{ precio }}</b></div>
            </div>
            {% endif %}

        </div>

        <div class="map-section">
            <div id="map"></div>
        </div>

    </div>
</div>

<!-- 🔥 DATA SEGURA DESDE FLASK -->
<script id="stops-data" type="application/json">
{{ stops | default([]) | tojson }}
</script>

<script>
let map, directionsService, directionsRenderer;
let markers = [];

// =========================
// INIT MAP
// =========================
window.initMap = function () {

    const origenInput = document.getElementById("origen");
    const destinoInput = document.getElementById("destino");

    map = new google.maps.Map(document.getElementById("map"), {
        center: { lat: 26.1224, lng: -80.1373 },
        zoom: 10,
    });

    directionsService = new google.maps.DirectionsService();

    directionsRenderer = new google.maps.DirectionsRenderer({
        suppressMarkers: true
    });

    directionsRenderer.setMap(map);

    new google.maps.places.Autocomplete(origenInput);
    new google.maps.places.Autocomplete(destinoInput);

    origenInput.addEventListener("input", calcularRuta);
    destinoInput.addEventListener("input", calcularRuta);

    // 🔥 CARGA SEGURA DE STOPS
    let stopsFromServer = [];
    try {
        const data = document.getElementById("stops-data").textContent;
        stopsFromServer = JSON.parse(data);
    } catch (e) {
        stopsFromServer = [];
    }

    stopsFromServer.forEach(function(valor) {
        agregarParada(valor);
    });

    actualizarEtiquetas();

    setTimeout(function() {
        if (origenInput.value && destinoInput.value) {
            calcularRuta();
        }
    }, 500);
};


// =========================
// MARKERS
// =========================
function limpiarMarkers() {
    markers.forEach(function(m) { m.setMap(null); });
    markers = [];
}

function dibujarMarcadores(result) {

    limpiarMarkers();

    const legs = result.routes[0].legs;

    markers.push(new google.maps.Marker({
        position: legs[0].start_location,
        label: "A",
        map: map
    }));

    legs.forEach(function(leg, index) {
        const label = String.fromCharCode(66 + index);

        markers.push(new google.maps.Marker({
            position: leg.end_location,
            label: label,
            map: map
        }));
    });
}


// =========================
// AGREGAR PARADA
// =========================
function agregarParada(valor = "") {

    const container = document.getElementById("stops-container");

    const group = document.createElement("div");
    group.className = "input-group";
    group.draggable = true;

    const label = document.createElement("span");
    label.className = "label";

    const wrapper = document.createElement("div");
    wrapper.className = "stop-wrapper";

    const input = document.createElement("input");
    input.className = "stop-input";
    input.name = "stops[]";
    input.placeholder = "Stop location";
    input.value = valor;

    const removeBtn = document.createElement("span");
    removeBtn.className = "remove-stop";
    removeBtn.innerText = "✕";

    removeBtn.onclick = function() {
        group.remove();
        actualizarEtiquetas();
        calcularRuta();
    };

    wrapper.appendChild(input);
    wrapper.appendChild(removeBtn);

    group.appendChild(label);
    group.appendChild(wrapper);

    container.appendChild(group);

    new google.maps.places.Autocomplete(input);

    input.addEventListener("input", function() {
        actualizarEtiquetas();
        calcularRuta();
    });

    group.addEventListener("dragstart", function() {
        group.classList.add("dragging");
    });

    group.addEventListener("dragend", function() {
        group.classList.remove("dragging");
        actualizarEtiquetas();
        calcularRuta();
    });

    actualizarEtiquetas();
}


// =========================
// DRAG & DROP
// =========================
const container = document.getElementById("stops-container");

container.addEventListener("dragover", function(e) {
    e.preventDefault();

    const dragging = document.querySelector(".dragging");
    if (!dragging) return;

    const afterElement = getDragAfterElement(container, e.clientY);

    if (!afterElement) {
        container.appendChild(dragging);
    } else {
        container.insertBefore(dragging, afterElement);
    }
});

function getDragAfterElement(container, y) {

    const elements = Array.from(
        container.querySelectorAll(".input-group:not(.dragging)")
    );

    let closest = null;
    let closestOffset = Number.NEGATIVE_INFINITY;

    elements.forEach(function(child) {

        const box = child.getBoundingClientRect();
        const offset = y - box.top - box.height / 2;

        if (offset < 0 && offset > closestOffset) {
            closestOffset = offset;
            closest = child;
        }
    });

    return closest;
}


// =========================
// ETIQUETAS
// =========================
function actualizarEtiquetas() {

    const stops = document.querySelectorAll("#stops-container .input-group");

    stops.forEach(function(group, index) {
        group.querySelector(".label").innerText =
            String.fromCharCode(66 + index);
    });

    document.getElementById("destino-label").innerText =
        String.fromCharCode(66 + stops.length);
}


// =========================
// RUTA
// =========================
function calcularRuta() {

    const origen = document.getElementById("origen").value;
    const destino = document.getElementById("destino").value;

    if (!origen || !destino) return;

    const stops = document.querySelectorAll(".stop-input");

    let waypoints = [];

    stops.forEach(function(stop) {
        if (stop.value) {
            waypoints.push({
                location: stop.value,
                stopover: true
            });
        }
    });

    directionsService.route({
        origin: origen,
        destination: destino,
        waypoints: waypoints,
        travelMode: 'DRIVING'
    }, function(result, status) {

        if (status === 'OK') {

            directionsRenderer.setDirections(result);
            dibujarMarcadores(result);

            let totalKm = 0;
            let totalMin = 0;

            result.routes[0].legs.forEach(function(leg) {
                totalKm += leg.distance.value;
                totalMin += leg.duration.value;
            });

            const km = totalKm / 1000;

    // ⏱️ DURACIÓN FORMATEADA
            const totalMinutes = Math.round(totalMin / 60);

            const hours = Math.floor(totalMinutes / 60);
            const minutes = totalMinutes % 60;

            let duracion = "";

            if (hours > 0) {
                duracion += hours + (hours === 1 ? " hr " : " hrs ");
                }

            if (minutes > 0) {
                duracion += minutes + " min";
                }

            if (duracion === "") {
                duracion = "0 min";
                }

    // 🕒 HORA DE LLEGADA (ETA)
            const now = new Date();
                now.setMinutes(now.getMinutes() + totalMinutes);

    // formato 12h AM/PM
            let hoursETA = now.getHours();
            const minutesETA = now.getMinutes();

            const ampm = hoursETA >= 12 ? "PM" : "AM";

            hoursETA = hoursETA % 12;
            hoursETA = hoursETA ? hoursETA : 12;

            const formattedMinutes = minutesETA < 10 ? "0" + minutesETA : minutesETA;

            const eta = hoursETA + ":" + formattedMinutes + " " + ampm;

    // guardar valores
            document.getElementById("km_real").value = km;
            document.getElementById("duracion_real").value = duracion;
            document.getElementById("eta_real").value = eta;

            document.getElementById("km_real").value = km;
            document.getElementById("duracion_real").value = duracion;

            const bounds = new google.maps.LatLngBounds();
            result.routes[0].overview_path.forEach(function(p) {
                bounds.extend(p);
            });
            map.fitBounds(bounds);
        }
    });
}


// =========================
// SUBMIT
// =========================
function handleSubmit() {
    calcularRuta();
    setTimeout(function() {
        document.getElementById("quoteForm").submit();
    }, 500);
}


// =========================
// GEOLOCATION
// =========================
function usarUbicacion() {
    navigator.geolocation.getCurrentPosition(function(position) {
        const lat = position.coords.latitude;
        const lng = position.coords.longitude;
        document.getElementById("origen").value = lat + "," + lng;
        calcularRuta();
    });
}


// =========================
// VEHICLE
// =========================
function selectVehicle(tipo, el) {
    document.getElementById("tipo").value = tipo;
    document.querySelectorAll(".vehicle-option").forEach(function(e) {
        e.classList.remove("active");
    });
    el.classList.add("active");
}
</script>

<script async defer
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyASKSqaSVc6WiZdhkN9mnTDEx5_AwDo2y8&libraries=places&callback=initMap">
</script>

</body>
</html>
