<!DOCTYPE html>
<html>
<head>
    <title>Cotizador</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h1 style="text-align:center;">🚐 Cotizador de Transporte</h1>

<form method="POST">

<input type="text" name="origen" placeholder="Pickup"
value="{{ request.form.origen }}" required><br><br>

<input type="text" name="destino" placeholder="Dropoff"
value="{{ request.form.destino }}" required><br><br>

<select name="tipo">
    <option value="Business" {% if request.form.tipo == "Business" %}selected{% endif %}>Business</option>
    <option value="Van" {% if request.form.tipo == "Van" %}selected{% endif %}>Van</option>
</select><br><br>

<button type="submit">Calcular</button>

</form>

{% if precio %}
    <div style="text-align:center; margin-top:20px;">
        <h3>Distancia: {{ "%.1f"|format(distancia) }} mi</h3>
        <h2>Precio: ${{ precio }}</h2>
    </div>
{% endif %}
</body>
</html>
