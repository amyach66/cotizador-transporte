<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            background-color: #0b1a2f;
            color: white;
            font-family: Arial;
            text-align: center;
        }

        .container {
            margin-top: 100px;
        }

        input, select {
            padding: 10px;
            border-radius: 8px;
            border: none;
            width: 250px;
            margin-bottom: 10px;
        }

        button {
            background-color: #22c55e;
            color: white;
            padding: 10px 30px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .resultado {
            margin-top: 30px;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>🚐 Cotizador de Transporte</h1>

    <form method="POST">

        <input type="text" name="origen" placeholder="Pickup"
        value="{{ request.form.origen }}" required><br>

        <input type="text" name="destino" placeholder="Dropoff"
        value="{{ request.form.destino }}" required><br>

        <select name="tipo">
            <option value="Business" {% if request.form.tipo == "Business" %}selected{% endif %}>Business</option>
            <option value="Van" {% if request.form.tipo == "Van" %}selected{% endif %}>Van</option>
        </select><br><br>

        <button type="submit">Calcular</button>

    </form>

    {% if precio %}
    <div class="resultado">
        <h3>Distancia: {{ "%.1f"|format(distancia) }} mi</h3>
        <h2>Precio: ${{ precio }}</h2>
    </div>
    {% endif %}

</div>

</body>
</html>
