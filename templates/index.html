<!DOCTYPE html>
<html>
<head>
    <title>Amyach Logistics</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container horizontal">
    <div class="card horizontal-card">

        <div class="form-section">

            <div class="branding">
                <h1>Amyach Logistics</h1>
                <p>Luxury Ride Quote</p>
            </div>

            <form method="POST" id="quoteForm">

                <button type="button" class="location-btn" onclick="usarUbicacion()">
                    📍 Use my location
                </button>

                <div class="input-group">
                    <span class="label">A</span>
                    <input id="origen" name="origen" value="{{ origen }}" placeholder="Pickup location" required>
                </div>

                <div id="stops-container"></div>

                <div class="input-group">
                    <span class="label" id="destino-label">B</span>
                    <input id="destino" name="destino" value="{{ destino }}" placeholder="Dropoff location" required>
                </div>

                <button type="button" onclick="agregarParada()">➕ Add Stop</button>

                <!-- CLIENT INFO -->
                <div class="input-group">
                    <input type="text" name="nombre_cliente" placeholder="Your name" required>
                </div>

                <div class="input-group">
                    <input type="tel" name="telefono_cliente" placeholder="Your phone number" required>
                </div>

                <!-- DATE -->
                <div class="input-group" style="flex-direction: column; align-items: flex-start;">
                    <label style="font-size: 12px; color: #9ca3af;">Select Date</label>
                    <input type="date" name="fecha" required>
                </div>

                <!-- TIME -->
                <div class="input-group" style="flex-direction: column; align-items: flex-start;">
                    <label style="font-size: 12px; color: #9ca3af;">Select Time</label>
                    <input type="time" name="hora" required>
                </div>

                <input type="hidden" name="km_real" id="km_real">
                <input type="hidden" name="duracion_real" id="duracion_real">
                <input type="hidden" name="eta_real" id="eta_real">

                <!-- 🔥 BOTÓN 1 -->
                <button type="button" onclick="handleCalculate()">Calculate Price</button>

                <!-- 🔥 BOTÓN 2 -->
                <button type="button" onclick="handleBooking()">Request Booking</button>

            </form>

            {% if precio %}
            <div class="resultado">
                <div>Distance: {{ distancia }} mi</div>
                <div>Duration: {{ duracion }}</div>
                <div>Arrival: {{ eta if eta else '-' }}</div>   
                <div class="price-label">Your Fare</div>
                <div class="price-value">${{ precio }}</div>
            </div>
            {% endif %}

        </div>

        <div class="map-section">
            <div id="map"></div>
        </div>

    </div>
</div>

<script id="stops-data" type="application/json">
{{ stops | default([]) | tojson }}
</script>

<script>
let map, directionsService, directionsRenderer;
let lastCalculation = null;

window.initMap = function () {

    const origenInput = document.getElementById("origen");
    const destinoInput = document.getElementById("destino");

    map = new google.maps.Map(document.getElementById("map"), {
        center: { lat: 26.1224, lng: -80.1373 },
        zoom: 10,
    });

    directionsService = new google.maps.DirectionsService();
    directionsRenderer = new google.maps.DirectionsRenderer({ suppressMarkers: true });
    directionsRenderer.setMap(map);

    new google.maps.places.Autocomplete(origenInput);
    new google.maps.places.Autocomplete(destinoInput);
};

function handleCalculate() {

    const origen = document.getElementById("origen").value;
    const destino = document.getElementById("destino").value;

    if (!origen || !destino) return;

    directionsService.route({
        origin: origen,
        destination: destino,
        travelMode: 'DRIVING'
    }, function(result, status) {

        if (status === 'OK') {

            let totalKm = 0;
            let totalMin = 0;

            result.routes[0].legs.forEach(function(leg) {
                totalKm += leg.distance.value;
                totalMin += leg.duration.value;
            });

            const km = totalKm / 1000;

            const totalMinutes = Math.round(totalMin / 60);
            const now = new Date();
            now.setMinutes(now.getMinutes() + totalMinutes);

            let eta = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

            document.getElementById("km_real").value = km;
            document.getElementById("duracion_real").value = totalMinutes + " min";
            document.getElementById("eta_real").value = eta;

            lastCalculation = {
                km: km,
                eta: eta
            };

            document.getElementById("quoteForm").submit();
        }
    });
}

function handleBooking() {

    if (!lastCalculation) {
        alert("Please calculate price first");
        return;
    }

    const nombre = document.querySelector('[name="nombre_cliente"]').value;
    const telefonoCliente = document.querySelector('[name="telefono_cliente"]').value;
    const fecha = document.querySelector('[name="fecha"]').value;
    const hora = document.querySelector('[name="hora"]').value;

    const mensaje = 
`🚐 *New Booking Request*

👤 Name: ${nombre}
📞 Phone: ${telefonoCliente}

📅 Date: ${fecha}
⏰ Time: ${hora}

🛣 Distance: ${lastCalculation.km.toFixed(1)} km
🕒 ETA: ${lastCalculation.eta}

💲 Price shown on screen

Please confirm availability.`;

    const telefono = "15615601688";

    const url = `https://wa.me/${telefono}?text=${encodeURIComponent(mensaje)}`;

    window.open(url, "_blank");
}
</script>

<script async defer
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyASKSqaSVc6WiZdhkN9mnTDEx5_AwDo2y8&libraries=places&callback=initMap">
</script>

</body>
</html>
